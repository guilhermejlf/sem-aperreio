<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Sem Aperreio{% endblock %}</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0f172a;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #e2e8f0;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    .header h1 {
      color: #22c55e;
      font-size: 24px;
      margin: 0;
    }
    .content {
      background: #1e293b;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .content h2 {
      color: #22c55e;
      font-size: 18px;
      margin-top: 0;
    }
    .content p {
      line-height: 1.6;
      margin: 12px 0;
    }
    .highlight {
      color: #22c55e;
      font-weight: bold;
    }
    .warning {
      color: #f59e0b;
      font-weight: bold;
    }
    .cta {
      display: inline-block;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      margin-top: 16px;
    }
    .footer {
      text-align: center;
      font-size: 12px;
      color: #64748b;
      margin-top: 24px;
    }
    @media (max-width: 480px) {
      .container { padding: 20px 16px; }
      .content { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Sem Aperreio</h1>
    </div>
    <div class="content">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      Você recebeu este email porque tem uma conta no Sem Aperreio.
    </div>
  </div>
</body>
</html>
